groups:
  - name: flask-alerts
    rules:
      - alert: HighErrorRate
        expr: sum(rate(flask_request_total{status="500"}[1m])) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for more than 1 minute"

      - alert: HighLatency
        expr: histogram_quantile(0.99, sum(rate(flask_request_duration_seconds_bucket[5m])) by (le, endpoint)) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency detected"
          description: "p99 latency is above 1 second for more than 2 minutes"
